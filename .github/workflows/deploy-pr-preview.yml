name: deploy-pr-preview

# Backend PR gate: build the PR image, deploy it as a labeled ACA revision
# with 0% production traffic, and post a live preview URL to the PR. This
# lets reviewers and Playwright tests hit the PR's actual backend before
# merge — without ever touching prod traffic.
#
# Safety invariants:
#   - The new revision is created with weight 0 (never 100). Prod traffic is
#     pinned to `<aca>--main-<sha>` by deploy-backend.yml and stays there.
#   - We pass `--revision-suffix pr-N-<sha>` so the revision name is
#     deterministic and reviewable in `az containerapp revision list`.
#   - The label `pr-N` exposes a stable URL `https://<aca>--pr-N.<env>/...`
#     that updates automatically on every push to the PR.

on:
  pull_request:
    types: [opened, synchronize, reopened]
    paths:
      - "backend/**"
      - ".github/workflows/deploy-pr-preview.yml"

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: deploy-pr-preview-${{ github.event.pull_request.number }}
  cancel-in-progress: true

env:
  AZURE_RG: ${{ vars.AZURE_RG }}
  ACR_NAME: ${{ vars.ACR_NAME }}
  ACA_NAME: ${{ vars.ACA_NAME }}
  IMAGE_NAME: create-ad-cut-backend
  PR_NUMBER: ${{ github.event.pull_request.number }}

jobs:
  preflight:
    runs-on: ubuntu-latest
    outputs:
      ready: ${{ steps.check.outputs.ready }}
    steps:
      - id: check
        env:
          HAS_CREDS: ${{ secrets.AZURE_CREDENTIALS != '' }}
        run: |
          if [ "$HAS_CREDS" = "true" ] && [ -n "$AZURE_RG" ] && [ -n "$ACR_NAME" ] && [ -n "$ACA_NAME" ]; then
            echo "ready=true" >> $GITHUB_OUTPUT
          else
            echo "::warning::Skipping PR preview — Azure secrets/variables are not configured."
            echo "ready=false" >> $GITHUB_OUTPUT
          fi

  preview:
    needs: preflight
    if: needs.preflight.outputs.ready == 'true' && github.actor != 'dependabot[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: ACR login
        run: az acr login -n "$ACR_NAME"

      - name: Build & push preview image
        run: |
          SHORT_SHA="${GITHUB_SHA::7}"
          IMAGE="${ACR_NAME}.azurecr.io/${IMAGE_NAME}:pr-${PR_NUMBER}-${SHORT_SHA}"
          docker build -t "$IMAGE" -f backend/Dockerfile backend
          docker push "$IMAGE"
          echo "IMAGE=$IMAGE" >> $GITHUB_ENV
          echo "SHORT_SHA=$SHORT_SHA" >> $GITHUB_ENV

      - name: Create preview ACA revision (0% traffic)
        run: |
          REVISION_SUFFIX="pr-${PR_NUMBER}-${SHORT_SHA}"
          NEW_REVISION="${ACA_NAME}--${REVISION_SUFFIX}"

          # `containerapp update --revision-suffix` creates a new revision in
          # Multiple mode with the existing traffic distribution unchanged
          # (the new revision gets 0% by default). Empirically verified:
          # ACA edge ROUTES requests to the revision-specific FQDN
          # (<aca>--<suffix>.<env>) regardless of weight, but REFUSES the
          # label FQDN (<aca>--<label>.<env>) with 404 when weight is 0.
          # → We expose the revision-specific FQDN as the live preview URL.
          az containerapp update \
            -g "$AZURE_RG" -n "$ACA_NAME" \
            --image "$IMAGE" \
            --revision-suffix "$REVISION_SUFFIX"

          # Re-assert prod traffic pin, defensively (Multiple mode invariant).
          MAIN_REV=$(az containerapp revision list \
            -g "$AZURE_RG" -n "$ACA_NAME" \
            --query "[?properties.active && contains(name, '--main-')] | sort_by(@, &properties.createdTime)[-1].name" -o tsv)
          if [ -n "$MAIN_REV" ]; then
            echo "Pinning 100% traffic to main revision: $MAIN_REV"
            az containerapp ingress traffic set \
              -g "$AZURE_RG" -n "$ACA_NAME" \
              --revision-weight "${MAIN_REV}=100"
          fi

          # Resolve revision-specific FQDN (deterministic from revision name).
          ENV_FQDN=$(az containerapp show -g "$AZURE_RG" -n "$ACA_NAME" --query properties.configuration.ingress.fqdn -o tsv)
          ENV_DOMAIN="${ENV_FQDN#*.}"
          PREVIEW_URL="https://${NEW_REVISION}.${ENV_DOMAIN}"
          echo "PREVIEW_URL=$PREVIEW_URL" >> $GITHUB_ENV
          echo "NEW_REVISION=$NEW_REVISION" >> $GITHUB_ENV

      - name: Re-assert EasyAuth disabled (idempotent)
        run: |
          # SWA Linked Backend may have re-enabled the authConfig. Backend
          # security relies on FastAPI's `require_api_key`, not EasyAuth.
          az containerapp auth update \
            -g "$AZURE_RG" -n "$ACA_NAME" \
            --enabled false \
            --unauthenticated-client-action AllowAnonymous \
          || true

      - name: Smoke-test preview revision
        run: |
          # /healthz is FastAPI-public (no API key needed). With EasyAuth
          # disabled by deploy-backend.yml, this should return 200 once the
          # new replica boots. Revision-specific FQDN routes regardless of
          # traffic weight (label-based FQDNs would 404 at 0% weight).
          echo "Probing $PREVIEW_URL/healthz ..."
          for i in 1 2 3 4 5 6; do
            CODE=$(curl -sS -o /dev/null -w "%{http_code}" --max-time 10 "$PREVIEW_URL/healthz" || echo "000")
            echo "  attempt $i → HTTP $CODE"
            if [ "$CODE" = "200" ]; then
              echo "Preview revision is healthy."
              echo "PREVIEW_HEALTH=$CODE" >> $GITHUB_ENV
              exit 0
            fi
            sleep 10
          done
          echo "::warning::Preview did not return 200 after 6 attempts (last code: $CODE). The revision may still be activating; the comment URL is posted anyway."
          echo "PREVIEW_HEALTH=$CODE" >> $GITHUB_ENV

      - name: Post live preview info to PR
        uses: marocchino/sticky-pull-request-comment@v2
        with:
          header: pr-preview-backend
          message: |
            ### 🚀 Backend PR preview is live

            | | |
            |---|---|
            | Image | `${{ env.IMAGE }}` |
            | Revision | `${{ env.NEW_REVISION }}` (0% production traffic) |
            | Live URL | <${{ env.PREVIEW_URL }}> |
            | Smoke check | `/healthz` → HTTP `${{ env.PREVIEW_HEALTH }}` (200 expected) |

            **How to verify this PR's backend changes:**

            ```bash
            # Public endpoint — no auth needed:
            curl ${{ env.PREVIEW_URL }}/healthz

            # API endpoints — `X-API-Key` header required (see azd env: BACKEND_API_KEY):
            curl -H "x-api-key: <KEY>" ${{ env.PREVIEW_URL }}/api/modes
            ```

            Production traffic stays on the current `main-*` revision (100%).
            On merge, `deploy-backend.yml` creates a new `main-<sha>` revision
            and shifts traffic to it by exact name (never `latestRevision`).
