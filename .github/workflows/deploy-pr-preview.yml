name: deploy-pr-preview

# Backend PR gate: build the container image from the PR branch and push to ACR
# so reviewers can verify the image builds cleanly. We intentionally do NOT
# create an ACA revision because EasyAuth + the SWA Linked Backend make
# label-based preview URLs unreachable to reviewers; SWA's own per-PR staging
# (deploy-frontend.yml) covers the user-facing preview need.

on:
  pull_request:
    types: [opened, synchronize, reopened]
    paths:
      - "backend/**"
      - ".github/workflows/deploy-pr-preview.yml"

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: deploy-pr-preview-${{ github.event.pull_request.number }}
  cancel-in-progress: true

env:
  ACR_NAME: ${{ vars.ACR_NAME }}
  IMAGE_NAME: create-ad-cut-backend
  PR_NUMBER: ${{ github.event.pull_request.number }}

jobs:
  preflight:
    runs-on: ubuntu-latest
    outputs:
      ready: ${{ steps.check.outputs.ready }}
    steps:
      - id: check
        env:
          HAS_CREDS: ${{ secrets.AZURE_CREDENTIALS != '' }}
        run: |
          if [ "$HAS_CREDS" = "true" ] && [ -n "$ACR_NAME" ]; then
            echo "ready=true" >> $GITHUB_OUTPUT
          else
            echo "::warning::Skipping PR preview — Azure secrets/variables are not configured."
            echo "ready=false" >> $GITHUB_OUTPUT
          fi

  preview:
    needs: preflight
    if: needs.preflight.outputs.ready == 'true' && github.actor != 'dependabot[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: ACR login
        run: az acr login -n "$ACR_NAME"

      - name: Build & push preview image
        run: |
          SHORT_SHA="${GITHUB_SHA::7}"
          IMAGE="${ACR_NAME}.azurecr.io/${IMAGE_NAME}:pr-${PR_NUMBER}-${SHORT_SHA}"
          docker build -t "$IMAGE" -f backend/Dockerfile backend
          docker push "$IMAGE"
          echo "IMAGE=$IMAGE" >> $GITHUB_ENV

      - name: Post image info to PR
        uses: marocchino/sticky-pull-request-comment@v2
        with:
          header: pr-preview-backend
          message: |
            ### 🐳 Backend image built

            | | |
            |---|---|
            | Image | `${{ env.IMAGE }}` |
            | Status | ✅ pushed to ACR — production traffic untouched |

            On merge to `main`, `deploy-backend.yml` will roll this image into the live ACA revision.
            Reviewer-facing UI preview comes from the SWA staging URL above (frontend job).
