name: deploy-pr-preview

# Backend PR preview: build image, then create a 0%-traffic ACA revision
# named pr-<N>-<sha>. Posts a sticky comment with the revision FQDN so the
# frontend job (which sets VITE_API_BASE_URL) and the e2e-playwright job can
# both read it. Production traffic is never affected — Multiple-revision mode
# keeps the `main-*` revision pinned at 100%.

on:
  pull_request:
    types: [opened, synchronize, reopened]
    paths:
      - "backend/**"
      - ".github/workflows/deploy-pr-preview.yml"

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: deploy-pr-preview-${{ github.event.pull_request.number }}
  cancel-in-progress: true

env:
  AZURE_RG: ${{ vars.AZURE_RG }}
  ACR_NAME: ${{ vars.ACR_NAME }}
  ACA_NAME: ${{ vars.ACA_NAME }}
  IMAGE_NAME: create-ad-cut-backend
  PR_NUMBER: ${{ github.event.pull_request.number }}

jobs:
  preflight:
    runs-on: ubuntu-latest
    outputs:
      ready: ${{ steps.check.outputs.ready }}
    steps:
      - id: check
        env:
          HAS_CREDS: ${{ secrets.AZURE_CREDENTIALS != '' }}
        run: |
          if [ "$HAS_CREDS" = "true" ] && [ -n "$AZURE_RG" ] && [ -n "$ACR_NAME" ] && [ -n "$ACA_NAME" ]; then
            echo "ready=true" >> $GITHUB_OUTPUT
          else
            echo "::warning::Skipping PR preview — Azure secrets/variables are not configured."
            echo "ready=false" >> $GITHUB_OUTPUT
          fi

  preview:
    needs: preflight
    if: needs.preflight.outputs.ready == 'true' && github.actor != 'dependabot[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: ACR login
        run: az acr login -n "$ACR_NAME"

      - name: Build & push preview image
        run: |
          SHORT_SHA="${GITHUB_SHA::7}"
          REV_SUFFIX="pr-${PR_NUMBER}-${SHORT_SHA}"
          IMAGE="${ACR_NAME}.azurecr.io/${IMAGE_NAME}:${REV_SUFFIX}"
          docker build -t "$IMAGE" -f backend/Dockerfile backend
          docker push "$IMAGE"
          echo "IMAGE=$IMAGE" >> $GITHUB_ENV
          echo "REV_SUFFIX=$REV_SUFFIX" >> $GITHUB_ENV
          echo "SHORT_SHA=$SHORT_SHA" >> $GITHUB_ENV

      - name: Create PR revision at 0% traffic
        run: |
          NEW_REVISION="${ACA_NAME}--${REV_SUFFIX}"

          # Deactivate any earlier pr-${PR_NUMBER}-* revisions from previous
          # commits on the same PR so we don't accumulate.
          az containerapp revision list \
            -g "$AZURE_RG" -n "$ACA_NAME" \
            --query "[?properties.active && contains(name, '--pr-${PR_NUMBER}-') && name != '${NEW_REVISION}'].name" \
            -o tsv | while read -r rev; do
              [ -z "$rev" ] && continue
              echo "Deactivating stale PR revision: $rev"
              az containerapp revision deactivate -g "$AZURE_RG" -n "$ACA_NAME" --revision "$rev" || true
            done

          # In Multiple mode `update` creates a revision without shifting
          # traffic. Existing weight config already pins main-* at 100%.
          az containerapp update \
            -g "$AZURE_RG" \
            -n "$ACA_NAME" \
            --image "$IMAGE" \
            --revision-suffix "$REV_SUFFIX"

          BASE_FQDN=$(az containerapp show -g "$AZURE_RG" -n "$ACA_NAME" \
            --query properties.configuration.ingress.fqdn -o tsv)
          ENV_DOMAIN="${BASE_FQDN#${ACA_NAME}.}"
          PREVIEW_URL="https://${ACA_NAME}--${REV_SUFFIX}.${ENV_DOMAIN}"
          echo "PREVIEW_URL=$PREVIEW_URL" >> $GITHUB_ENV
          echo "Preview URL: $PREVIEW_URL"

      - name: Smoke test preview /healthz
        run: |
          for i in 1 2 3 4 5 6; do
            CODE=$(curl -s -o /dev/null -w "%{http_code}" "$PREVIEW_URL/healthz" || echo "000")
            echo "Attempt $i: HTTP $CODE"
            [ "$CODE" = "200" ] && exit 0
            sleep 10
          done
          echo "::error::Preview /healthz never returned 200 (last: $CODE)"
          exit 1

      - name: Post preview URL to PR
        uses: marocchino/sticky-pull-request-comment@v2
        with:
          header: pr-preview-backend
          message: |
            <!-- backend-preview-url:${{ env.PREVIEW_URL }} -->
            ### Backend preview revision

            | | |
            |---|---|
            | Revision | `${{ env.REV_SUFFIX }}` |
            | URL | ${{ env.PREVIEW_URL }} |
            | Health | `/healthz` returned 200 |
            | Traffic | 0% (prod untouched) |

            Frontend job builds with `VITE_API_BASE_URL=${{ env.PREVIEW_URL }}` so the per-PR SWA staging UI exercises this revision. On merge, `deploy-backend.yml` pins 100% traffic to a new `main-<sha>` revision.
