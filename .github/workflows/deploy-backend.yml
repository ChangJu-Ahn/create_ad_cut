name: deploy-backend

on:
  push:
    branches: [main]
    paths:
      - "backend/**"
      - ".github/workflows/deploy-backend.yml"
  workflow_dispatch:

concurrency:
  # Serialize main deploys; cancel an in-flight build if a newer commit lands
  # so the latest revision is the one that wins traffic.
  group: deploy-backend-main
  cancel-in-progress: true

env:
  AZURE_RG: ${{ vars.AZURE_RG }}
  ACR_NAME: ${{ vars.ACR_NAME }}
  ACA_NAME: ${{ vars.ACA_NAME }}
  IMAGE_NAME: create-ad-cut-backend

jobs:
  preflight:
    runs-on: ubuntu-latest
    outputs:
      ready: ${{ steps.check.outputs.ready }}
    steps:
      - id: check
        env:
          HAS_CREDS: ${{ secrets.AZURE_CREDENTIALS != '' }}
        run: |
          if [ "$HAS_CREDS" = "true" ] && [ -n "$AZURE_RG" ] && [ -n "$ACR_NAME" ] && [ -n "$ACA_NAME" ]; then
            echo "ready=true" >> $GITHUB_OUTPUT
          else
            echo "::warning::Skipping deploy-backend — Azure secrets/variables are not configured. See docs/deployment.md §3."
            echo "ready=false" >> $GITHUB_OUTPUT
          fi

  build-and-deploy:
    needs: preflight
    if: needs.preflight.outputs.ready == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: ACR login
        run: az acr login -n "$ACR_NAME"

      - name: Build & push image
        run: |
          SHORT_SHA="${GITHUB_SHA::7}"
          IMAGE="${ACR_NAME}.azurecr.io/${IMAGE_NAME}:main-${SHORT_SHA}"
          docker build -t "$IMAGE" -f backend/Dockerfile backend
          docker push "$IMAGE"
          echo "IMAGE=$IMAGE" >> $GITHUB_ENV
          echo "REVISION_SUFFIX=main-${SHORT_SHA}" >> $GITHUB_ENV

      - name: Update Container App revision
        run: |
          # Multiple-revision mode: create a new traceable revision per main
          # commit. The `latestRevision: true` traffic rule (set in Bicep)
          # routes 100% of production traffic to the freshest revision.
          az containerapp update \
            -g "$AZURE_RG" \
            -n "$ACA_NAME" \
            --image "$IMAGE" \
            --revision-suffix "$REVISION_SUFFIX"
          # Ensure ingress target port matches the FastAPI listener (8000),
          # in case the previous revision was still on the bootstrap port (80).
          az containerapp ingress update \
            -g "$AZURE_RG" \
            -n "$ACA_NAME" \
            --type external \
            --target-port 8000

      - name: Show app URL
        run: |
          FQDN=$(az containerapp show -g "$AZURE_RG" -n "$ACA_NAME" --query properties.configuration.ingress.fqdn -o tsv)
          echo "Backend URL: https://$FQDN" >> $GITHUB_STEP_SUMMARY
          echo "Revision suffix: $REVISION_SUFFIX" >> $GITHUB_STEP_SUMMARY
