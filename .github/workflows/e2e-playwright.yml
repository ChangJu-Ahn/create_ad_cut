name: e2e-playwright

# After deploy-frontend (SWA staging) and deploy-pr-preview (ACA revision)
# both post their URL via sticky comments, this workflow:
#   1) reads the URLs from the PR comments (waiting up to 10 min if needed),
#   2) drives the SWA staging UI through Playwright,
#   3) uploads screenshots to a shared branch (gh-screenshots) so they have
#      a stable URL, and
#   4) posts a sticky PR comment embedding those screenshots inline.

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: e2e-playwright-${{ github.event.pull_request.number }}
  cancel-in-progress: true

env:
  PR_NUMBER: ${{ github.event.pull_request.number }}
  # Use the same SHA the deploy workflows use for their revision suffix.
  # `pull_request.head.sha` is the head commit, but GITHUB_SHA on a
  # pull_request event is the merge commit — and that is what
  # deploy-pr-preview / deploy-frontend encode into the URL.
  MERGE_SHA: ${{ github.sha }}

jobs:
  e2e:
    if: github.actor != 'dependabot[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Wait for preview URLs
        id: urls
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Poll PR comments for the two sticky markers posted by
          # deploy-pr-preview.yml and deploy-frontend.yml. Time out after 10 min.
          #
          # Race avoidance: the BACKEND URL is `...--pr-<N>-<shortsha>.<env>`,
          # so it changes every push and we MUST wait for the current SHA's
          # value (older revisions are deactivated by the new deploy run).
          # The FRONTEND URL is a stable per-PR SWA staging URL whose content
          # is overwritten in place — there is no SHA in the URL itself, so
          # we just wait for the marker to exist; bundle freshness is handled
          # by the in-spec landing retry.
          SHORT_SHA="${MERGE_SHA::7}"
          echo "Looking for backend marker matching SHA prefix: $SHORT_SHA"
          for i in $(seq 1 60); do
            COMMENTS=$(gh pr view "$PR_NUMBER" --json comments --jq '.comments[].body' || echo "")
            FE=$(echo "$COMMENTS" | grep -oE 'frontend-preview-url:[^ ]+' | tail -1 | cut -d: -f2-)
            BE=$(echo "$COMMENTS" | grep -oE 'backend-preview-url:[^ ]+' | grep -F "$SHORT_SHA" | tail -1 | cut -d: -f2-)
            if [ -n "$FE" ] && [ -n "$BE" ]; then
              echo "frontend=$FE" >> $GITHUB_OUTPUT
              echo "backend=$BE" >> $GITHUB_OUTPUT
              echo "Frontend URL: $FE"
              echo "Backend URL:  $BE"
              exit 0
            fi
            echo "Attempt $i/60 — markers not yet ready (FE=${FE:-?}, BE=${BE:-?})"
            sleep 10
          done
          echo "::error::Timed out waiting for preview URLs (FE marker or current-SHA BE marker)"
          exit 1

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Playwright
        working-directory: e2e
        run: |
          npm ci || npm install
          npx playwright install --with-deps chromium

      - name: Run Playwright
        id: pw
        working-directory: e2e
        env:
          FRONTEND_URL: ${{ steps.urls.outputs.frontend }}
          BACKEND_URL: ${{ steps.urls.outputs.backend }}
        run: |
          # Give SWA a moment to finish propagating after the comment posted.
          sleep 15
          npx playwright test --reporter=list

      - name: Upload Playwright artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-pr-${{ env.PR_NUMBER }}
          path: |
            e2e/playwright-report
            e2e/test-results
            e2e/screenshots
          retention-days: 14

      - name: Publish screenshots to gh-screenshots branch
        if: always()
        id: publish
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -e
          SCREENSHOT_DIR=e2e/screenshots
          if [ ! -d "$SCREENSHOT_DIR" ] || [ -z "$(ls -A $SCREENSHOT_DIR 2>/dev/null)" ]; then
            echo "no_screenshots=true" >> $GITHUB_OUTPUT
            echo "::warning::No screenshots produced — Playwright run may have failed early."
            exit 0
          fi

          # Stage screenshots on an orphan branch so they have stable raw URLs.
          # Each PR + run gets its own subdirectory keyed by SHA.
          TARGET_BRANCH=gh-screenshots
          DEST_DIR="pr-${PR_NUMBER}/${HEAD_SHA}"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          # Move screenshots aside before switching branches.
          mkdir -p /tmp/screenshots
          cp $SCREENSHOT_DIR/*.png /tmp/screenshots/

          if git ls-remote --exit-code --heads origin "$TARGET_BRANCH" >/dev/null 2>&1; then
            git fetch origin "$TARGET_BRANCH"
            git switch "$TARGET_BRANCH"
          else
            git switch --orphan "$TARGET_BRANCH"
            git rm -rf . >/dev/null 2>&1 || true
            echo "Playwright screenshots from PR previews" > README.md
          fi

          mkdir -p "$DEST_DIR"
          cp /tmp/screenshots/*.png "$DEST_DIR/"
          git add "$DEST_DIR" README.md 2>/dev/null || git add "$DEST_DIR"
          git commit -m "screenshots: PR #${PR_NUMBER} @ ${HEAD_SHA::7}" || echo "nothing to commit"
          git push origin "$TARGET_BRANCH"

          RAW_BASE="https://raw.githubusercontent.com/${GITHUB_REPOSITORY}/${TARGET_BRANCH}/${DEST_DIR}"
          {
            echo "raw_base=$RAW_BASE"
            echo "no_screenshots=false"
          } >> $GITHUB_OUTPUT

          # List screenshot filenames for the comment step.
          ls /tmp/screenshots | sort > /tmp/shotlist.txt
          echo "shotlist<<EOF" >> $GITHUB_OUTPUT
          cat /tmp/shotlist.txt >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Build PR comment body
        if: always()
        id: body
        env:
          FE: ${{ steps.urls.outputs.frontend }}
          BE: ${{ steps.urls.outputs.backend }}
          RAW_BASE: ${{ steps.publish.outputs.raw_base }}
          SHOTS: ${{ steps.publish.outputs.shotlist }}
          NO_SHOTS: ${{ steps.publish.outputs.no_screenshots }}
          PW_OUTCOME: ${{ steps.pw.outcome }}
        run: |
          {
            echo 'body<<COMMENT_EOF'
            echo "### Playwright E2E — ${PW_OUTCOME}"
            echo ''
            echo '| | |'
            echo '|---|---|'
            echo "| Frontend | $FE |"
            echo "| Backend  | $BE |"
            echo "| Outcome  | $PW_OUTCOME |"
            echo ''
            if [ "$NO_SHOTS" = "true" ] || [ -z "$RAW_BASE" ]; then
              echo '_No screenshots produced._'
            else
              echo '#### Captured screens'
              echo ''
              while IFS= read -r shot; do
                [ -z "$shot" ] && continue
                echo "**$shot**"
                echo ''
                echo "![${shot}](${RAW_BASE}/${shot})"
                echo ''
              done <<< "$SHOTS"
            fi
            echo 'COMMENT_EOF'
          } >> $GITHUB_OUTPUT

      - name: Post Playwright result to PR
        if: always()
        uses: marocchino/sticky-pull-request-comment@v2
        with:
          header: pr-preview-playwright
          message: ${{ steps.body.outputs.body }}
