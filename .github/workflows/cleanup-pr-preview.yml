name: cleanup-pr-preview

# Tear down the ACA preview revision when a PR closes (merged or not).
# Frees the label `pr-<N>` and deactivates the revision so it stops billing.

on:
  pull_request:
    types: [closed]

permissions:
  contents: read
  pull-requests: write

env:
  AZURE_RG: ${{ vars.AZURE_RG }}
  ACA_NAME: ${{ vars.ACA_NAME }}
  PR_NUMBER: ${{ github.event.pull_request.number }}

jobs:
  cleanup:
    runs-on: ubuntu-latest
    if: ${{ secrets.AZURE_CREDENTIALS != '' && vars.AZURE_RG != '' && vars.ACA_NAME != '' }}
    steps:
      - uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Remove label & deactivate PR revisions
        run: |
          LABEL="pr-${PR_NUMBER}"

          az containerapp revision label remove \
            -g "$AZURE_RG" -n "$ACA_NAME" \
            --label "$LABEL" --no-prompt >/dev/null 2>&1 || true

          # Deactivate any revision whose suffix starts with `pr-<N>-`.
          REVISIONS=$(az containerapp revision list \
            -g "$AZURE_RG" -n "$ACA_NAME" \
            --query "[?starts_with(name, '${ACA_NAME}--pr-${PR_NUMBER}-')].name" \
            -o tsv)

          for REV in $REVISIONS; do
            echo "Deactivating $REV"
            az containerapp revision deactivate \
              -g "$AZURE_RG" -n "$ACA_NAME" \
              --revision "$REV" >/dev/null 2>&1 || true
          done

      - name: Comment teardown on PR
        uses: marocchino/sticky-pull-request-comment@v2
        with:
          header: pr-preview-backend
          message: |
            ### 🧹 Backend PR preview torn down

            The `pr-${{ env.PR_NUMBER }}` revision(s) were deactivated and the label was removed.
