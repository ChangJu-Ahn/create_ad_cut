name: cleanup-pr-preview

# When a PR closes (merged or not), deactivate its `pr-<N>-*` ACA revisions
# so the platform doesn't accumulate stale previews. Prod `main-*` revisions
# are untouched.

on:
  pull_request:
    types: [closed]

permissions:
  contents: read

concurrency:
  group: cleanup-pr-preview-${{ github.event.pull_request.number }}
  cancel-in-progress: false

env:
  AZURE_RG: ${{ vars.AZURE_RG }}
  ACA_NAME: ${{ vars.ACA_NAME }}
  PR_NUMBER: ${{ github.event.pull_request.number }}

jobs:
  preflight:
    runs-on: ubuntu-latest
    outputs:
      ready: ${{ steps.check.outputs.ready }}
    steps:
      - id: check
        env:
          HAS_CREDS: ${{ secrets.AZURE_CREDENTIALS != '' }}
        run: |
          if [ "$HAS_CREDS" = "true" ] && [ -n "$AZURE_RG" ] && [ -n "$ACA_NAME" ]; then
            echo "ready=true" >> $GITHUB_OUTPUT
          else
            echo "ready=false" >> $GITHUB_OUTPUT
          fi

  cleanup:
    needs: preflight
    if: needs.preflight.outputs.ready == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Deactivate PR revisions
        run: |
          az containerapp revision list \
            -g "$AZURE_RG" -n "$ACA_NAME" \
            --query "[?properties.active && contains(name, '--pr-${PR_NUMBER}-')].name" \
            -o tsv | while read -r rev; do
              [ -z "$rev" ] && continue
              echo "Deactivating: $rev"
              az containerapp revision deactivate -g "$AZURE_RG" -n "$ACA_NAME" --revision "$rev" || true
            done
