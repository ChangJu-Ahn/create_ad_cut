# yaml-language-server: $schema=https://raw.githubusercontent.com/Azure/azure-dev/main/schemas/v1.0/azure.yaml.json

name: create-ad-cut
metadata:
  template: create-ad-cut@1.0.0

services:
  backend:
    project: ./backend
    language: python
    host: containerapp
    docker:
      path: Dockerfile
      context: .
      remoteBuild: true

  frontend:
    project: ./frontend
    language: ts
    host: staticwebapp
    dist: dist

hooks:
  postprovision:
    windows:
      shell: pwsh
      run: |
        Write-Host "✅ Provisioning complete."
        Write-Host "  Backend (ACA) FQDN: $env:BACKEND_FQDN"
        Write-Host "  Static Web App URL: https://$env:SWA_HOSTNAME"
    posix:
      shell: sh
      run: |
        echo "✅ Provisioning complete."
        echo "  Backend (ACA) FQDN: $BACKEND_FQDN"
        echo "  Static Web App URL: https://$SWA_HOSTNAME"
  postdeploy:
    windows:
      shell: pwsh
      run: |
        # Bicep deploys ACA with a placeholder image on port 80. After azd
        # deploy swaps in the real backend image, align ingress target-port
        # with the FastAPI listener (8000) so the app is actually reachable.
        if ($env:BACKEND_NAME -and $env:AZURE_RESOURCE_GROUP) {
          az containerapp ingress update `
            -g $env:AZURE_RESOURCE_GROUP `
            -n $env:BACKEND_NAME `
            --type external `
            --target-port 8000 | Out-Null
          Write-Host "✅ Container App ingress target-port set to 8000."
        }
    posix:
      shell: sh
      run: |
        if [ -n "$BACKEND_NAME" ] && [ -n "$AZURE_RESOURCE_GROUP" ]; then
          az containerapp ingress update \
            -g "$AZURE_RESOURCE_GROUP" \
            -n "$BACKEND_NAME" \
            --type external \
            --target-port 8000 >/dev/null
          echo "✅ Container App ingress target-port set to 8000."
        fi
